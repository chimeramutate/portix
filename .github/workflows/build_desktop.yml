name: Build Desktop App

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write

env:
  # Determine channel from tag name or manual input.
  # Tags containing "-beta" go to beta channel, otherwise stable.
  IS_BETA: ${{ contains(github.ref_name, '-beta') || (github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'beta') }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            os: macos-latest
            rust_asset: libportix_serv_macos.dylib
            bundled_lib: libportix_serv.dylib
            flutter_build_target: macos
            artifact_path: build/macos/Build/Products/Release/*.app
            package_name: portix-macos

          - target: linux
            os: ubuntu-latest
            rust_asset: libportix_serv_linux.so
            bundled_lib: libportix_serv.so
            flutter_build_target: linux
            artifact_path: build/linux/x64/release/bundle
            package_name: portix-linux

          - target: windows
            os: windows-latest
            rust_asset: portix_serv_windows.dll
            bundled_lib: portix_serv.dll
            flutter_build_target: windows
            artifact_path: build/windows/x64/runner/Release
            package_name: portix-windows

    steps:
      - name: Checkout Flutter app
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: portix-serv

      - name: Checkout Rust backend
        uses: actions/checkout@v4
        with:
          repository: Asepimam/portix-serv
          token: ${{ secrets.GH_PAT }}
          ref: master
          path: portix-serv

      - name: Build Rust native library (hardened)
        run: cargo build --profile release-hardened --manifest-path portix-serv/Cargo.toml

      - name: Verify Dart-Rust bridge hash sync
        shell: bash
        run: |
          DART_HASH=$(sed -n 's/.*int get rustContentHash => \(-\?[0-9]*\);/\1/p' lib/src/rust/frb_generated.dart)
          RUST_HASH=$(sed -n 's/.*FLUTTER_RUST_BRIDGE_CODEGEN_CONTENT_HASH: i32 = \(-\?[0-9]*\);/\1/p' portix-serv/src/frb_generated.rs)
          echo "Dart content hash: $DART_HASH"
          echo "Rust content hash: $RUST_HASH"
          if [ "$DART_HASH" != "$RUST_HASH" ]; then
            echo "::error::Content hash mismatch! Dart ($DART_HASH) != Rust ($RUST_HASH). Run flutter_rust_bridge_codegen to sync."
            exit 1
          fi
          echo "✓ Bridge hashes match"

      - name: Prepare Rust library
        shell: bash
        run: |
          mkdir -p rust-libs
          if [ "${{ matrix.target }}" = "linux" ]; then
            cp portix-serv/target/release-hardened/libportix_serv.so rust-libs/${{ matrix.rust_asset }}
          elif [ "${{ matrix.target }}" = "macos" ]; then
            cp portix-serv/target/release-hardened/libportix_serv.dylib rust-libs/${{ matrix.rust_asset }}
          elif [ "${{ matrix.target }}" = "windows" ]; then
            cp portix-serv/target/release-hardened/portix_serv.dll rust-libs/${{ matrix.rust_asset }}
          fi

      - name: Build Flutter
        run: flutter build ${{ matrix.flutter_build_target }} --release --dart-define=PORTIX_BACKEND=rust --dart-define=RUST_LIBRARY_MODE=production

      # ── Post-build Security Scan ─────────────────────────────────────────────
      - name: Trivy scan – built artifact
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          skip-dirs: "target,build"

      - name: Bundle Rust library - macOS
        if: matrix.target == 'macos'
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -n 1)
          echo "Found app: $APP_PATH"
          cp rust-libs/${{ matrix.rust_asset }} "$APP_PATH/Contents/MacOS/${{ matrix.bundled_lib }}"
          codesign --force --sign - "$APP_PATH/Contents/MacOS/${{ matrix.bundled_lib }}"
          codesign --force --deep --sign - "$APP_PATH"

      - name: Bundle Rust library - Linux
        if: matrix.target == 'linux'
        run: |
          cp rust-libs/${{ matrix.rust_asset }} build/linux/x64/release/bundle/${{ matrix.bundled_lib }}
          chmod +x build/linux/x64/release/bundle/${{ matrix.bundled_lib }}

      - name: Bundle system libraries - Linux
        if: matrix.target == 'linux'
        run: |
          BUNDLE_LIB="build/linux/x64/release/bundle/lib"
          # Bundle libsecret and its dependency libgcrypt so the app works
          # on systems without libsecret installed.
          for lib in libsecret-1.so.0 libgcrypt.so.20; do
            LIB_PATH=$(ldconfig -p | grep "$lib" | head -1 | awk '{print $NF}')
            if [ -n "$LIB_PATH" ] && [ ! -f "$BUNDLE_LIB/$lib" ]; then
              cp "$LIB_PATH" "$BUNDLE_LIB/$lib"
              echo "Bundled $lib from $LIB_PATH"
            fi
          done

      - name: Bundle Rust library - Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Copy-Item `
            "rust-libs/${{ matrix.rust_asset }}" `
            "build/windows/x64/runner/Release/${{ matrix.bundled_lib }}"

      - name: Package app - macOS
        if: matrix.target == 'macos'
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -n 1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "${{ matrix.package_name }}-${{ github.ref_name }}.zip"

      - name: Package app - Linux
        if: matrix.target == 'linux'
        run: |
          tar -czf "${{ matrix.package_name }}-${{ github.ref_name }}.tar.gz" -C build/linux/x64/release bundle

      - name: Build .deb package - Linux
        if: matrix.target == 'linux'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bash packaging/linux/build-deb.sh "$VERSION"
          cp build/linux/deb/*.deb "${{ matrix.package_name }}-${{ github.ref_name }}.deb"

      - name: Package app - Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build/windows/x64/runner/Release/*" `
            -DestinationPath "${{ matrix.package_name }}-${{ github.ref_name }}.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}-${{ github.ref_name }}
          path: |
            ${{ matrix.package_name }}-${{ github.ref_name }}.*

      - name: Upload package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ env.IS_BETA == 'true' }}
          name: ${{ env.IS_BETA == 'true' && format('Portix {0} (Beta)', github.ref_name) || format('Portix {0}', github.ref_name) }}
          draft: false
          make_latest: ${{ env.IS_BETA != 'true' }}
          fail_on_unmatched_files: false
          files: |
            ${{ matrix.package_name }}-${{ github.ref_name }}.*

  snap:
    name: Build Snap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Rust backend
        uses: actions/checkout@v4
        with:
          repository: Asepimam/portix-serv
          token: ${{ secrets.GH_PAT }}
          ref: master
          path: portix-serv

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snap-build

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: portix-snap-${{ github.ref_name }}
          path: ${{ steps.snap-build.outputs.snap }}

      - name: Publish snap to Snap Store
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_TOKEN }}
        with:
          snap: ${{ steps.snap-build.outputs.snap }}
          release: ${{ env.IS_BETA == 'true' && 'beta' || 'stable' }}

      - name: Upload snap to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ env.IS_BETA == 'true' }}
          files: ${{ steps.snap-build.outputs.snap }}
