name: Build Desktop App

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - stable
          - beta
      serv_tag:
        description: "portix-serv tag to use (default: same as this tag)"
        required: false
        default: ""

permissions:
  contents: write

env:
  # Determine channel from tag name or manual input.
  # Tags containing "-beta" go to beta channel, otherwise stable.
  IS_BETA: ${{ contains(github.ref_name, '-beta') || (github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'beta') }}

jobs:
  wait-for-serv-release:
    name: Wait for portix-serv release
    runs-on: ubuntu-latest
    outputs:
      serv_tag: ${{ steps.resolve.outputs.serv_tag }}
    steps:
      - name: Resolve portix-serv tag
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.serv_tag }}" ]; then
            # Pakai input manual jika diisi
            SERV_TAG="${{ github.event.inputs.serv_tag }}"
          else
            # Strip suffix -beta* dari ref_name
            # v1.2.3-beta1 → v1.2.3 | v1.2.3 → v1.2.3
            SERV_TAG=$(echo "${{ github.ref_name }}" | sed 's/-beta[^/]*$//')
          fi
          echo "Flutter tag  : ${{ github.ref_name }}"
          echo "portix-serv tag: $SERV_TAG"
          echo "serv_tag=$SERV_TAG" >> "$GITHUB_OUTPUT"

      - name: Wait until portix-serv release is published
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          SERV_TAG="${{ steps.resolve.outputs.serv_tag }}"
          echo "Waiting for portix-serv release: $SERV_TAG"
          for i in $(seq 1 20); do
            STATUS=$(gh release view "$SERV_TAG" \
              --repo Asepimam/portix-serv \
              --json isDraft,isPrerelease,assets \
              2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "Attempt $i/20: Release not found yet, waiting 60s..."
              sleep 60
              continue
            fi

            # Cek apakah semua asset yang dibutuhkan sudah ada
            ASSETS=$(echo "$STATUS" | jq -r '.assets[].name')
            NEEDED=(
              "libportix_serv_macos.dylib"
              "libportix_serv_linux.so"
              "portix_serv_windows.dll"
            )
            ALL_READY=true
            for asset in "${NEEDED[@]}"; do
              if ! echo "$ASSETS" | grep -q "$asset"; then
                echo "Attempt $i/20: Asset '$asset' not ready yet, waiting 60s..."
                ALL_READY=false
                break
              fi
            done

            if [ "$ALL_READY" = "true" ]; then
              echo "✓ All portix-serv assets are ready!"
              exit 0
            fi
          done

          echo "::error::Timeout waiting for portix-serv release $SERV_TAG after 20 minutes."
          exit 1

  # ── Build desktop per platform ───────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: wait-for-serv-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            os: macos-latest
            rust_asset: libportix_serv_macos.dylib
            bundled_lib: libportix_serv.dylib
            flutter_build_target: macos
            artifact_path: build/macos/Build/Products/Release/*.app
            package_name: portix-macos

          - target: linux
            os: ubuntu-latest
            rust_asset: libportix_serv_linux.so
            bundled_lib: libportix_serv.so
            flutter_build_target: linux
            artifact_path: build/linux/x64/release/bundle
            package_name: portix-linux

          - target: windows
            os: windows-latest
            rust_asset: portix_serv_windows.dll
            bundled_lib: portix_serv.dll
            flutter_build_target: windows
            artifact_path: build/windows/x64/runner/Release
            package_name: portix-windows

    steps:
      - name: Checkout Flutter app
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      # ── Download pre-built Rust binary dari portix-serv release ──────────────
      - name: Download Rust native library from portix-serv release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p rust-libs
          echo "Downloading ${{ matrix.rust_asset }} from portix-serv @ ${{ needs.wait-for-serv-release.outputs.serv_tag }}"
          gh release download "${{ needs.wait-for-serv-release.outputs.serv_tag }}" \
            --repo Asepimam/portix-serv \
            --pattern "${{ matrix.rust_asset }}" \
            --dir rust-libs/
          echo "✓ Downloaded:"
          ls -lh rust-libs/

      # ── Verifikasi bridge hash tetap dilakukan dari source portix-serv ────────
      - name: Checkout Rust backend (for bridge hash check only)
        uses: actions/checkout@v4
        with:
          repository: Asepimam/portix-serv
          token: ${{ secrets.GH_PAT }}
          ref: ${{ needs.wait-for-serv-release.outputs.serv_tag }}
          path: portix-serv
          sparse-checkout: |
            src/frb_generated.rs
          sparse-checkout-cone-mode: false

      - name: Verify Dart-Rust bridge hash sync
        shell: bash
        run: |
          DART_HASH=$(sed -n 's/.*int get rustContentHash => \(-\?[0-9]*\);/\1/p' lib/src/rust/frb_generated.dart)
          RUST_HASH=$(sed -n 's/.*FLUTTER_RUST_BRIDGE_CODEGEN_CONTENT_HASH: i32 = \(-\?[0-9]*\);/\1/p' portix-serv/src/frb_generated.rs)
          echo "Dart content hash : $DART_HASH"
          echo "Rust content hash  : $RUST_HASH"
          if [ "$DART_HASH" != "$RUST_HASH" ]; then
            echo "::error::Content hash mismatch! Dart ($DART_HASH) != Rust ($RUST_HASH). Run flutter_rust_bridge_codegen to sync."
            exit 1
          fi
          echo "✓ Bridge hashes match"

      - name: Build Flutter
        run: flutter build ${{ matrix.flutter_build_target }} --release --dart-define=PORTIX_BACKEND=rust --dart-define=RUST_LIBRARY_MODE=production

      # ── Post-build Security Scan ─────────────────────────────────────────────
      - name: Trivy scan – built artifact
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          skip-dirs: "target,build,portix-serv"

      - name: Bundle Rust library - macOS
        if: matrix.target == 'macos'
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -n 1)
          echo "Found app: $APP_PATH"
          cp rust-libs/${{ matrix.rust_asset }} "$APP_PATH/Contents/MacOS/${{ matrix.bundled_lib }}"
          codesign --force --sign - "$APP_PATH/Contents/MacOS/${{ matrix.bundled_lib }}"
          codesign --force --deep --sign - "$APP_PATH"

      - name: Bundle Rust library - Linux
        if: matrix.target == 'linux'
        run: |
          cp rust-libs/${{ matrix.rust_asset }} build/linux/x64/release/bundle/${{ matrix.bundled_lib }}
          chmod +x build/linux/x64/release/bundle/${{ matrix.bundled_lib }}

      - name: Bundle system libraries - Linux
        if: matrix.target == 'linux'
        run: |
          BUNDLE_LIB="build/linux/x64/release/bundle/lib"
          for lib in libsecret-1.so.0 libgcrypt.so.20; do
            LIB_PATH=$(ldconfig -p | grep "$lib" | head -1 | awk '{print $NF}')
            if [ -n "$LIB_PATH" ] && [ ! -f "$BUNDLE_LIB/$lib" ]; then
              cp "$LIB_PATH" "$BUNDLE_LIB/$lib"
              echo "Bundled $lib from $LIB_PATH"
            fi
          done

      - name: Bundle Rust library - Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Copy-Item `
            "rust-libs/${{ matrix.rust_asset }}" `
            "build/windows/x64/runner/Release/${{ matrix.bundled_lib }}"

      - name: Package app - macOS
        if: matrix.target == 'macos'
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -n 1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "${{ matrix.package_name }}-${{ github.ref_name }}.zip"

      - name: Package app - Linux
        if: matrix.target == 'linux'
        run: |
          tar -czf "${{ matrix.package_name }}-${{ github.ref_name }}.tar.gz" -C build/linux/x64/release bundle

      - name: Build .deb package - Linux
        if: matrix.target == 'linux'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bash packaging/linux/build-deb.sh "$VERSION"
          cp build/linux/deb/*.deb "${{ matrix.package_name }}-${{ github.ref_name }}.deb"

      - name: Package app - Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build/windows/x64/runner/Release/*" `
            -DestinationPath "${{ matrix.package_name }}-${{ github.ref_name }}.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}-${{ github.ref_name }}
          path: |
            ${{ matrix.package_name }}-${{ github.ref_name }}.*

      - name: Upload package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ env.IS_BETA == 'true' }}
          name: ${{ env.IS_BETA == 'true' && format('Portix {0} (Beta)', github.ref_name) || format('Portix {0}', github.ref_name) }}
          draft: false
          make_latest: ${{ env.IS_BETA != 'true' }}
          fail_on_unmatched_files: false
          files: |
            ${{ matrix.package_name }}-${{ github.ref_name }}.*

  snap:
    name: Build Snap
    runs-on: ubuntu-latest
    needs: wait-for-serv-release
    steps:
      - name: Checkout Flutter app
        uses: actions/checkout@v4

      - name: Checkout Rust backend
        uses: actions/checkout@v4
        with:
          repository: Asepimam/portix-serv
          token: ${{ secrets.GH_PAT }}
          ref: ${{ needs.wait-for-serv-release.outputs.serv_tag }}
          path: portix-serv

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snap-build

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: portix-snap-${{ github.ref_name }}
          path: ${{ steps.snap-build.outputs.snap }}

      - name: Publish snap to Snap Store
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_TOKEN }}
        with:
          snap: ${{ steps.snap-build.outputs.snap }}
          release: ${{ env.IS_BETA == 'true' && 'beta' || 'stable' }}

      - name: Upload snap to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ env.IS_BETA == 'true' }}
          files: ${{ steps.snap-build.outputs.snap }}

  # ── Build Flatpak ─────────────────────────────────────────────────────────
  # Reuse hasil build job `build` (target linux) — tidak build Flutter ulang.
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: build
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: portix-linux-${{ github.ref_name }}
          path: artifact

      - name: Extract bundle for Flatpak source
        run: |
          mkdir -p flatpak/bundle-src
          tar -xzf artifact/portix-linux-${{ github.ref_name }}.tar.gz \
            -C flatpak/bundle-src --strip-components=1
          echo "Extracted bundle contents:"
          find flatpak/bundle-src -maxdepth 2

      - name: Copy desktop assets into Flatpak build context
        run: |
          mkdir -p flatpak/assets
          cp assets/icons/portix_launcher.png flatpak/assets/portix_launcher.png
          cp flatpak/com.github.asep.Portix.desktop flatpak/assets/com.github.asep.Portix.desktop
          cp flatpak/com.github.asep.Portix.metainfo.xml flatpak/assets/com.github.asep.Portix.metainfo.xml

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: portix-${{ github.ref_name }}.flatpak
          manifest-path: flatpak/com.github.asep.Portix.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Lint Flatpak manifest and bundle
        run: |
          flatpak run --command=flatpak-builder-lint org.flatpak.Builder \
            manifest flatpak/com.github.asep.Portix.yml || true
          flatpak run --command=flatpak-builder-lint org.flatpak.Builder \
            repo .flatpak-builder/ || true

      - name: Upload flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: portix-flatpak-${{ github.ref_name }}
          path: portix-${{ github.ref_name }}.flatpak

      - name: Upload flatpak to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ env.IS_BETA == 'true' }}
          fail_on_unmatched_files: false
          files: portix-${{ github.ref_name }}.flatpak

  # ── Publish update ke repo Flathub ───────────────────────────────────────
  # PRASYARAT: app sudah disetujui Flathub dan repo flathub/com.github.asep.Portix
  # sudah ada. Job ini TIDAK melakukan submission pertama kali — itu wajib manual
  # via PR ke flathub/flathub. Job ini hanya update versi untuk rilis selanjutnya.
  #
  # Hanya jalan untuk channel stable (Flathub stable repo). Skip untuk beta,
  # karena Flathub punya konsep "beta" terpisah (branch beta repo) yang setupnya
  # beda dan tidak di-cover di sini secara default.
  publish-flathub:
    name: Publish update to Flathub repo
    runs-on: ubuntu-latest
    needs: flatpak
    if: startsWith(github.ref, 'refs/tags/') && env.IS_BETA != 'true'
    steps:
      - name: Checkout Portix (source manifest)
        uses: actions/checkout@v4
        with:
          path: portix

      - name: Checkout flathub/com.github.asep.Portix
        uses: actions/checkout@v4
        with:
          repository: flathub/com.github.asep.Portix
          token: ${{ secrets.FLATHUB_PAT }}
          path: flathub-repo

      - name: Download linux bundle artifact (untuk hitung checksum)
        uses: actions/download-artifact@v4
        with:
          name: portix-linux-${{ github.ref_name }}
          path: artifact

      - name: Resolve release version & download URL
        id: vars
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARCHIVE="artifact/portix-linux-${{ github.ref_name }}.tar.gz"
          SHA256=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          URL="https://github.com/Asepimam/portix/releases/download/${{ github.ref_name }}/portix-linux-${{ github.ref_name }}.tar.gz"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

          echo "Version : $VERSION"
          echo "SHA256  : $SHA256"
          echo "URL     : $URL"

      - name: Update manifest in Flathub repo
        run: |
          MANIFEST="flathub-repo/com.github.asep.Portix.yml"

          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Manifest tidak ditemukan di flathub-repo. Pastikan submission pertama sudah disetujui dan struktur repo sesuai."
            exit 1
          fi

          # Update URL dan sha256 pada source type:archive milik module 'portix'.
          # Asumsi: manifest di sisi Flathub sudah pakai pendekatan archive URL,
          # bukan dir lokal seperti versi CI testing kita.
          python3 - "$MANIFEST" "${{ steps.vars.outputs.url }}" "${{ steps.vars.outputs.sha256 }}" <<'PYEOF'
          import sys, re

          manifest_path, url, sha256 = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(manifest_path) as f:
              content = f.read()

          content = re.sub(r'url:\s*.*portix-linux.*\.tar\.gz', f'url: {url}', content)
          content = re.sub(r'(sha256:\s*)[a-f0-9]{64}', rf'\g<1>{sha256}', content)

          with open(manifest_path, 'w') as f:
              f.write(content)

          print("Manifest updated.")
          PYEOF

      - name: Update metainfo release entry
        run: |
          METAINFO="flathub-repo/com.github.asep.Portix.metainfo.xml"
          VERSION="${{ steps.vars.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          if [ -f "$METAINFO" ]; then
            python3 - "$METAINFO" "$VERSION" "$DATE" <<'PYEOF'
          import sys, re

          path, version, date = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(path) as f:
              content = f.read()

          new_release = f'    <release version="{version}" date="{date}">\n      <description>\n        <p>See release notes on GitHub.</p>\n      </description>\n    </release>\n'
          content = re.sub(r'(<releases>\n)', r'\1' + new_release, content, count=1)

          with open(path, 'w') as f:
              f.write(content)
          PYEOF
          else
            echo "metainfo.xml tidak ditemukan, skip update release entry."
          fi

      - name: Commit & push update to Flathub repo
        run: |
          cd flathub-repo
          git config user.name "portix-release-bot"
          git config user.email "actions@users.noreply.github.com"

          if git diff --quiet; then
            echo "Tidak ada perubahan untuk di-commit."
            exit 0
          fi

          git add com.github.asep.Portix.yml com.github.asep.Portix.metainfo.xml
          git commit -m "Update to ${{ github.ref_name }}"
          git push origin HEAD

      - name: Summary
        run: |
          echo "✓ Manifest di flathub/com.github.asep.Portix sudah di-update ke ${{ github.ref_name }}."
          echo "Flathub buildbot akan otomatis build & publish dari commit ini."
          echo "Cek status build di: https://buildbot.flathub.org/#/apps/com.github.asep.Portix"
