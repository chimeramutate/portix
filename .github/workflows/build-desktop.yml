name: Build Desktop App

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write

env:
  IS_BETA: ${{ contains(github.ref_name, '-beta') || (github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'beta') }}

jobs:
  # ── Build native Rust lib + Flutter app together, per platform ─────────────
  # No more separate repo, no more wait-for-release, no more cross-repo PAT.
  # Rust is compiled fresh in the same job right before Flutter build needs it.
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            os: macos-latest
            bundled_lib: libportix_serv.dylib
            flutter_build_target: macos
            artifact_path: portix_app/build/macos/Build/Products/Release/*.app
            package_name: portix-macos

          - target: linux
            os: ubuntu-latest
            bundled_lib: libportix_serv.so
            flutter_build_target: linux
            artifact_path: portix_app/build/linux/x64/release/bundle
            package_name: portix-linux

          - target: windows
            os: windows-latest
            bundled_lib: portix_serv.dll
            flutter_build_target: windows
            artifact_path: portix_app/build/windows/x64/runner/Release
            package_name: portix-windows

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            portix_serv/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('portix_serv/Cargo.lock') }}

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Build Rust native library
        working-directory: portix_serv
        run: cargo build --release

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Get Flutter dependencies
        working-directory: portix_app
        run: flutter pub get

      # No cross-repo checkout needed anymore — both hash files live in this
      # repo, so this is a plain local file comparison.
      - name: Verify Dart-Rust bridge hash sync
        shell: bash
        run: |
          DART_HASH=$(sed -n 's/.*int get rustContentHash => \(-\?[0-9]*\);/\1/p' portix_app/lib/src/rust/frb_generated.dart)
          RUST_HASH=$(sed -n 's/.*FLUTTER_RUST_BRIDGE_CODEGEN_CONTENT_HASH: i32 = \(-\?[0-9]*\);/\1/p' portix_serv/src/frb_generated.rs)
          echo "Dart content hash : $DART_HASH"
          echo "Rust content hash  : $RUST_HASH"
          if [ "$DART_HASH" != "$RUST_HASH" ]; then
            echo "::error::Content hash mismatch! Dart ($DART_HASH) != Rust ($RUST_HASH). Run flutter_rust_bridge_codegen to sync."
            exit 1
          fi
          echo "✓ Bridge hashes match"

      - name: Build Flutter
        working-directory: portix_app
        run: flutter build ${{ matrix.flutter_build_target }} --release --dart-define=PORTIX_BACKEND=rust --dart-define=RUST_LIBRARY_MODE=production

      - name: Trivy scan – built artifact
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          skip-dirs: "portix_serv/target,portix_app/build"

      # ── Bundle Rust lib straight from cargo's target dir ───────────────────
      - name: Bundle Rust library - macOS
        if: matrix.target == 'macos'
        run: |
          APP_PATH=$(find portix_app/build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -n 1)
          cp portix_serv/target/release/libportix_serv.dylib "$APP_PATH/Contents/MacOS/${{ matrix.bundled_lib }}"
          codesign --force --sign - "$APP_PATH/Contents/MacOS/${{ matrix.bundled_lib }}"
          codesign --force --deep --sign - "$APP_PATH"

      - name: Bundle Rust library - Linux
        if: matrix.target == 'linux'
        run: |
          cp portix_serv/target/release/libportix_serv.so portix_app/build/linux/x64/release/bundle/${{ matrix.bundled_lib }}
          chmod +x portix_app/build/linux/x64/release/bundle/${{ matrix.bundled_lib }}

      - name: Bundle system libraries - Linux
        if: matrix.target == 'linux'
        run: |
          BUNDLE_LIB="portix_app/build/linux/x64/release/bundle/lib"
          for lib in libsecret-1.so.0 libgcrypt.so.20; do
            LIB_PATH=$(ldconfig -p | grep "$lib" | head -1 | awk '{print $NF}')
            if [ -n "$LIB_PATH" ] && [ ! -f "$BUNDLE_LIB/$lib" ]; then
              cp "$LIB_PATH" "$BUNDLE_LIB/$lib"
              echo "Bundled $lib from $LIB_PATH"
            fi
          done

      - name: Bundle Rust library - Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Copy-Item `
            "portix_serv/target/release/portix_serv.dll" `
            "portix_app/build/windows/x64/runner/Release/${{ matrix.bundled_lib }}"

      - name: Package app - macOS
        if: matrix.target == 'macos'
        run: |
          APP_PATH=$(find portix_app/build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -n 1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "${{ matrix.package_name }}-${{ github.ref_name }}.zip"

      - name: Package app - Linux
        if: matrix.target == 'linux'
        run: |
          tar -czf "${{ matrix.package_name }}-${{ github.ref_name }}.tar.gz" -C portix_app/build/linux/x64/release bundle

      - name: Build .deb package - Linux
        if: matrix.target == 'linux'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bash packaging/linux/build-deb.sh "$VERSION"
          cp portix_app/build/linux/deb/*.deb "${{ matrix.package_name }}-${{ github.ref_name }}.deb"

      - name: Package app - Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "portix_app/build/windows/x64/runner/Release/*" `
            -DestinationPath "${{ matrix.package_name }}-${{ github.ref_name }}.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package_name }}-${{ github.ref_name }}
          path: |
            ${{ matrix.package_name }}-${{ github.ref_name }}.*

      - name: Upload package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ env.IS_BETA == 'true' }}
          name: ${{ env.IS_BETA == 'true' && format('Portix {0} (Beta)', github.ref_name) || format('Portix {0}', github.ref_name) }}
          draft: false
          make_latest: ${{ env.IS_BETA != 'true' }}
          fail_on_unmatched_files: false
          files: |
            ${{ matrix.package_name }}-${{ github.ref_name }}.*

  snap:
    name: Build Snap
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v7

      - name: Sync snapcraft.yaml version with git tag
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SNAPCRAFT_FILE="snap/snapcraft.yaml"

          if [ ! -f "$SNAPCRAFT_FILE" ]; then
            echo "::error::$SNAPCRAFT_FILE not found."
            exit 1
          fi

          if grep -qE '^version:' "$SNAPCRAFT_FILE"; then
            sed -i "s/^version:.*/version: \"${VERSION}\"/" "$SNAPCRAFT_FILE"
          else
            sed -i "/^name:/a version: \"${VERSION}\"" "$SNAPCRAFT_FILE"
          fi

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snap-build

      - name: Upload snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: portix-snap-${{ github.ref_name }}
          path: ${{ steps.snap-build.outputs.snap }}

      - name: Publish snap to Snap Store
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: snapcore/action-publish@v1
        with:
          snap: ${{ steps.snap-build.outputs.snap }}
          release: ${{ env.IS_BETA == 'true' && 'beta' || 'stable' }}
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_TOKEN }}

      - name: Upload snap to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ env.IS_BETA == 'true' }}
          files: ${{ steps.snap-build.outputs.snap }}

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: build
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download linux bundle artifact
        uses: actions/download-artifact@v6
        with:
          name: portix-linux-${{ github.ref_name }}
          path: artifact

      - name: Extract bundle for Flatpak source
        run: |
          mkdir -p flatpak/bundle-src
          tar -xzf artifact/portix-linux-${{ github.ref_name }}.tar.gz \
            -C flatpak/bundle-src --strip-components=1

      - name: Copy desktop assets into Flatpak build context
        run: |
          mkdir -p flatpak/assets
          cp assets/icons/portix_launcher.png flatpak/assets/portix_launcher.png
          cp flatpak/com.github.asepimam.Portix.desktop flatpak/assets/com.github.asepimam.Portix.desktop
          cp flatpak/com.github.asepimam.Portix.metainfo.xml flatpak/assets/com.github.asepimam.Portix.metainfo.xml

      - name: Validate app icon is square
        run: |
          set -euo pipefail
          ICON="flatpak/assets/portix_launcher.png"
          DIMS=$(python3 -c "
          import struct
          with open('$ICON', 'rb') as f:
              data = f.read(33)
              w, h = struct.unpack('>II', data[16:24])
              print(f'{w}x{h}')
          ")
          WIDTH="${DIMS%x*}"
          HEIGHT="${DIMS#*x}"
          if [ "$WIDTH" != "$HEIGHT" ]; then
            echo "::error::App icon '$ICON' is ${DIMS}, but Flatpak/AppStream requires a SQUARE icon."
            exit 1
          fi

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: portix-${{ github.ref_name }}.flatpak
          manifest-path: flatpak/com.github.asepimam.Portix.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: portix-flatpak-${{ github.ref_name }}
          path: portix-${{ github.ref_name }}.flatpak

      - name: Upload flatpak to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ env.IS_BETA == 'true' }}
          fail_on_unmatched_files: false
          files: portix-${{ github.ref_name }}.flatpak

  publish-flathub:
    name: Publish update to Flathub repo
    runs-on: ubuntu-latest
    needs: flatpak
    # Job-level `if:` still can't read top-level `env`, so IS_BETA is
    # recomputed here directly from github.ref_name instead of a separate
    # wait-for-serv-release job output (that job no longer exists).
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-beta')
    steps:
      - name: Checkout monorepo (source manifest)
        uses: actions/checkout@v7
        with:
          path: portix

      - name: Checkout flathub/com.github.asepimam.Portix
        uses: actions/checkout@v7
        with:
          repository: flathub/com.github.asepimam.Portix
          token: ${{ secrets.FLATHUB_PAT }}
          path: flathub-repo

      - name: Download linux bundle artifact
        uses: actions/download-artifact@v6
        with:
          name: portix-linux-${{ github.ref_name }}
          path: artifact

      - name: Resolve release version & download URL
        id: vars
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARCHIVE="artifact/portix-linux-${{ github.ref_name }}.tar.gz"
          SHA256=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          URL="https://github.com/Asepimam/portix/releases/download/${{ github.ref_name }}/portix-linux-${{ github.ref_name }}.tar.gz"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Update manifest in Flathub repo
        run: |
          MANIFEST="flathub-repo/com.github.asepimam.Portix.yml"
          python3 - "$MANIFEST" "${{ steps.vars.outputs.url }}" "${{ steps.vars.outputs.sha256 }}" <<'PYEOF'
          import sys, re
          manifest_path, url, sha256 = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(manifest_path) as f:
              content = f.read()
          content = re.sub(r'url:\s*.*portix-linux.*\.tar\.gz', f'url: {url}', content)
          content = re.sub(r'(sha256:\s*)[a-f0-9]{64}', rf'\g<1>{sha256}', content)
          with open(manifest_path, 'w') as f:
              f.write(content)
          PYEOF

      - name: Commit & push update to Flathub repo
        run: |
          cd flathub-repo
          git config user.name "portix-release-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet; then
            echo "Tidak ada perubahan untuk di-commit."
            exit 0
          fi
          git add com.github.asepimam.Portix.yml
          git commit -m "Update to ${{ github.ref_name }}"
          git push origin HEAD
