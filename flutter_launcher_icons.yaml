# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/portix_launcher.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/portix_launcher.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"

  windows:
    generate: true
    image_path: "assets/icons/portix_launcher.png"
    icon_size: 48 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/icons/portix_launcher.png"

  linux:
    generate: true
    image_path: "assets/icons/portix_launcher.png"
