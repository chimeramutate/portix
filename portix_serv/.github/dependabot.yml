version: 2

updates:
  # Cargo dependencies
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 10
    reviewers:
      - Asepimam
    labels:
      - dependencies
      - security
    ignore:
      # flutter_rust_bridge must be bumped manually to stay in sync with the UI side
      - dependency-name: flutter_rust_bridge

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
